<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airbnb hotel Popupcard</title>
    <!--External CSS file-->
    <link rel="stylesheet" href="style.css" />
    <!--Google Font - Popping / Volkhov-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Volkhov:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav>
        <img src="images\logo.png" alt="" width="25px" />
        <ul>
          <li>Homes</li>
          <li>Experiences</li>
          <li>Services</li>
        </ul>
        <div>
          <button class="popup" onclick="myFunction()">
            Click here
            <span class="popupcontent" id="myPopup"
              >Get a 50% Offer by Booking Your Rooms Today</span
            >
          </button>
        </div>
      </nav>
    </header>
    <div class="main-container">
      <div class="img-div">
        <img src="images\hotel.jpg" alt="" />
        <p style="margin-top: 10px; font-family: poppins; font-size: 15px">
          Villa in Colva
        </p>
        <div class="content-div">
          <div>
            <p style="color: rgb(48, 47, 47); font-size: 14px">
              ₹9,457 for 2 nights
            </p>
          </div>
          <div class="icon">
            <p
              style="
                color: rgb(48, 47, 47);
                font-size: 14px;
                font-family: poppins;
              "
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                width="20px"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"
                />
              </svg>
            </p>
            <p
              style="
                color: rgb(48, 47, 47);
                font-size: 14px;
                font-family: poppins;
              "
            >
              4.98
            </p>
          </div>
        </div>
      </div>
    </div>
    <script>
      // When the user clicks on <div>, open the popup
      function myFunction() {
        var popup = document.getElementById("myPopup");
        popup.classList.toggle("show");
      }
    </script>
  </body>
</html>
